<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern QR Code Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default: Dark Mode */
            --bg-body: #000000;
            --bg-container: #000000;
            --container-border: 1px solid #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --input-bg: #111111;
            --input-border: #222222;
            --input-text: #ffffff;
            --qr-box-bg: #050505;
            --qr-box-border: #333333;
            --shadow: none;
            --glow-primary: rgba(108, 92, 231, 0.4);
            --glow-secondary: rgba(0, 206, 201, 0.4);
        }

        body.light-mode {
            /* Light Mode */
            --bg-body: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --bg-container: rgba(255, 255, 255, 0.95);
            --container-border: none;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --input-bg: #ffffff;
            --input-border: #e1e5ee;
            --input-text: #333333;
            --qr-box-bg: #fafafa;
            --qr-box-border: #e1e5ee;
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
            --glow-primary: rgba(108, 92, 231, 0.3);
            --glow-secondary: rgba(0, 206, 201, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            transition: background 0.4s ease;
        }

        .container {
            background: var(--bg-container);
            padding: 40px;
            border-radius: 24px;
            border: var(--container-border);
            box-shadow: var(--shadow);
            text-align: center;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(10px);
            position: relative;
            transition: all 0.4s ease;
        }

        .theme-toggle {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 0;
            margin: 0;
            width: auto;
            box-shadow: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .theme-toggle:hover {
            transform: scale(1.15) rotate(15deg);
        }

        h2 {
            margin-bottom: 12px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 24px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 16px;
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 2px solid var(--input-border);
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
            transform: translateY(-1px);
        }

        input.error {
            border-color: #ff7675;
            box-shadow: 0 0 0 4px rgba(255, 118, 117, 0.15);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        button:not(.theme-toggle) {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-generate {
            background-color: #6c5ce7;
            color: white;
            box-shadow: 0 4px 15px var(--glow-primary);
        }

        .btn-generate:hover {
            background-color: #5849c4;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--glow-primary);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        /* Fixed Specificity here to guarantee it hides on load */
        #downloadBtn {
            background-color: #00cec9;
            color: #000;
            box-shadow: 0 4px 15px var(--glow-secondary);
            display: none; 
        }

        /* The class added via JS to reveal the button */
        #downloadBtn.show {
            display: flex;
            animation: revealDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes revealDown {
            0% { opacity: 0; transform: translateY(-15px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        #downloadBtn:hover {
            background-color: #00b8b5;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--glow-secondary);
        }

        #qr-box {
            margin-top: 25px;
            min-height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed var(--qr-box-border);
            border-radius: 16px;
            background: var(--qr-box-bg);
            transition: all 0.4s ease;
            position: relative;
        }

        #qr-box.success {
            border: 2px solid #6c5ce7;
            box-shadow: inset 0 0 20px rgba(108, 92, 231, 0.05);
        }

        img {
            max-width: 180px;
            display: none;
            border-radius: 12px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.7) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .loader {
            border: 4px solid #111;
            border-top: 4px solid #6c5ce7;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            position: absolute;
        }

        body.light-mode .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #6c5ce7;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="container">
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle Theme">☀️</button>
        <h2>QR Generator</h2>
        <p>Transform any link or text into a QR code instantly.</p>

        <input type="text" id="userInput" placeholder="Paste your URL or text here...">
        
        <button class="btn-generate" onclick="generateQR()">
            ✨ Generate QR Code
        </button>
        <button class="btn-download" id="downloadBtn" onclick="downloadQR()">
            ⬇️ Download PNG
        </button>

        <div id="qr-box">
            <div class="loader" id="loader"></div>
            <img id="qrImage" src="" alt="Generated QR Code">
        </div>
    </div>

    <script>
        const inputField = document.getElementById('userInput');

        // Theme Toggle Functionality
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const themeBtn = document.getElementById('themeToggle');
            
            if (document.body.classList.contains('light-mode')) {
                themeBtn.innerHTML = '🌙';
            } else {
                themeBtn.innerHTML = '☀️';
            }
        }

        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                generateQR();
            }
        });

        inputField.addEventListener("input", function() {
            inputField.classList.remove("error");
            
            // Hide download button if user starts typing a new URL
            if(document.getElementById('downloadBtn').classList.contains('show')) {
                document.getElementById('downloadBtn').classList.remove('show');
                document.getElementById('qrImage').style.display = 'none';
                document.getElementById('qr-box').classList.remove('success');
            }
        });

        function generateQR() {
            const inputData = inputField.value;
            const qrImage = document.getElementById('qrImage');
            const downloadBtn = document.getElementById('downloadBtn');
            const loader = document.getElementById('loader');
            const qrBox = document.getElementById('qr-box');

            if (inputData.trim() === "") {
                inputField.classList.add("error");
                return;
            }

            // Reset states for loading
            qrImage.style.display = "none";
            downloadBtn.classList.remove("show"); // Hide button during loading
            qrBox.classList.remove("success");
            
            loader.style.display = "block";
            
            // Subtle pulse border effect while loading
            qrBox.style.borderColor = "#6c5ce7";
            qrBox.style.borderStyle = "dashed";

            const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&data=${encodeURIComponent(inputData)}&margin=10`;

            qrImage.onload = function() {
                loader.style.display = "none";
                qrImage.style.display = "block";
                
                // Add success styling and show download button
                qrBox.classList.add("success");
                qrBox.style.borderStyle = "solid";
                downloadBtn.classList.add("show");
            };

            qrImage.src = apiUrl;
        }

        function downloadQR() {
            const imgSrc = document.getElementById('qrImage').src;
            const downloadBtn = document.getElementById('downloadBtn');
            
            const originalText = downloadBtn.innerHTML;
            downloadBtn.innerHTML = "⏳ Downloading...";

            fetch(imgSrc)
                .then(response => response.blob())
                .then(blob => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = 'modern-qrcode.png';
                    
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    setTimeout(() => {
                        downloadBtn.innerHTML = originalText;
                    }, 1000);
                })
                .catch(() => {
                    alert("Something went wrong with the download. Please try again.");
                    downloadBtn.innerHTML = originalText;
                });
        }
    </script>

</body>
</html>
